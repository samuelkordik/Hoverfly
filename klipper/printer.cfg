[include mainsail.cfg]
[include timelapse.cfg]

# Hoverfly - Ender 3 Pro, SKR Mini E3 V2.0, dual Z (series-wired, single driver),
# Sprite Extruder Pro (direct drive), CRTouch probe.
# See README.md in this repo for hardware history / Marlin fallback config.

[mcu]
# Fill in once printer is connected via USB (Step 4):
# ls /dev/serial/by-id/*  ->  paste the result below
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FFDC054754343035551557-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
# Homing uses the CRTouch probe exclusively (matches your Marlin
# USE_PROBE_FOR_Z_HOMING setup) - no physical Z endstop is wired.
endstop_pin: probe:z_virtual_endstop
# -4 gives enough downward travel for PROBE_CALIBRATE (CRTouch triggers
# above the nozzle, so calibration needs to jog into negative Z).
position_min: -4
position_max: 250

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
full_steps_per_rotation: 200
# PLACEHOLDER - Sprite Extruder Pro's 3.5:1 gearing. Recalibrate with the
# "measure and trim" extruder calibration procedure in Step 5. Do not trust
# this number as final.
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
# PLACEHOLDER - Marlin PID values do NOT transfer to Klipper (different PWM
# scaling/loop timing). Run PID_CALIBRATE HEATER=extruder in Step 5.
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 250

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
#control: pid
# PLACEHOLDER - run PID_CALIBRATE HEATER=heater_bed in Step 5.
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -30
y_offset: -40
# PLACEHOLDER - always start probes at z_offset: 0.0 and calibrate fresh
# with PROBE_CALIBRATE in Step 5. Never reuse a Marlin Z-offset directly.
#z_offset: 0.0
samples: 2
speed: 3
sample_retract_dist: 3.0

[safe_z_home]
# (X_BED_SIZE-10)/2, (Y_BED_SIZE-10)/2 from your Marlin Z_SAFE_HOMING config
home_xy_position: 100, 100
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_screws]
# PLACEHOLDER - typical Ender 3 4-corner screw layout, adjust to match
# Hoverfly's actual screw positions if BED_SCREWS_ADJUST doesn't land
# the nozzle near each screw. This is a one-time manual-leveling helper,
# separate from the CRTouch's automatic bed_mesh compensation below.
screw1: 35, 35
screw2: 35, 195
screw3: 195, 195
screw4: 195, 35
horizontal_move_z: 10

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 190, 190
probe_count: 5, 5

[heater_fan heatbreak_cooling_fan]
pin: PC7
heater: extruder
heater_temp: 50.0

[fan]
pin: PC6

[firmware_retraction]
# PLACEHOLDER - starting values for a direct-drive extruder (Sprite Extruder
# Pro needs much shorter retraction than a bowden setup). Tune by testing for
# oozing/stringing vs. clogging the direct-drive gears; adjust with
# SET_RETRACTION at runtime before committing new values here.
retract_length: 0.5
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[static_digital_output usb_pullup_enable]
pins: !PA14

[board_pins]
aliases:
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>
# EXP1_3 = TX1
# EXP1_4 = RST
# EXP1_5 = RX1

[temperature_sensor host]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp


